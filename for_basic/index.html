<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ For 迴圈視覺化模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .code-line {
            transition: background-color 0.2s ease;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
        }
        .highlight {
            background-color: #fde047; /* Yellow-300 */
            color: #000 !important;
            border-radius: 4px;
        }
        .memory-cell {
            transition: all 0.4s ease;
        }
        .changed {
            background-color: #86efac; /* Green-300 */
            transform: scale(1.1);
        }
        .destroyed {
            background-color: #fee2e2; /* Red-100 */
            border-color: #f87171; /* Red-400 */
            opacity: 0.6;
        }
        .console-text {
            font-family: 'Courier New', Courier, monospace;
        }
        
        /* 基礎卡片高度 */
        .dashboard-card-sm {
            height: 180px;
        }
        .dashboard-card-lg {
            height: 320px;
        }

        /* 右側佈局高度固定 524px (與左側 180+24+320 對齊) */
        .right-column {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: 524px;
        }

        /* Trace Box 顏色動態變化 */
        .trace-box {
            height: 70px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .terminal-box {
            flex-grow: 1; 
            min-height: 180px;
        }
        .dashboard-card-ram {
            height: 180px;
        }

        /* 狀態背景顏色定義 */
        .bg-init { background-color: #3b82f6; color: white; }
        .bg-check { background-color: #a855f7; color: white; }
        .bg-body { background-color: #f8fafc; color: #1e293b; border: 1px solid #e2e8f0; }
        .bg-update { background-color: #22c55e; color: white; }
        .bg-end { background-color: #ef4444; color: white; }
        .bg-ready { background-color: white; color: #94a3b8; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-6xl mx-auto">
        <header class="mb-4 text-center">
            <h1 class="text-2xl font-bold text-slate-800">C++ For 迴圈視覺化控制台</h1>
        </header>

        <!-- 左右雙欄佈局 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- [左側] 程式碼與控制 -->
            <div class="flex flex-col gap-6">
                <!-- 程式碼顯示區 -->
                <div class="dashboard-card-sm bg-slate-900 text-gray-100 p-6 rounded-xl shadow-lg relative overflow-hidden border-b-4 border-blue-500">
                    <div class="absolute top-2 right-4 text-xs text-slate-500 uppercase tracking-widest font-bold">Source Code</div>
                    <div class="mt-2">
                        <pre class="text-sm md:text-base leading-relaxed">
<div id="line-1" class="code-line px-2">for(<span id="code-init" class="text-blue-400">int i = 0</span>; <span id="code-cond" class="text-purple-400">i < 5</span>; <span id="code-update" class="text-green-400">i++</span>){</div><div id="line-2" class="code-line px-2">    cout << i << endl;</div><div id="line-3" class="code-line px-2">}</div></pre>
                    </div>
                </div>

                <!-- 參數設定與控制按鈕 -->
                <div id="control-panel" class="dashboard-card-lg bg-white p-6 rounded-xl shadow-lg flex flex-col justify-between border-t-4 border-slate-800">
                    <div>
                        <h2 class="text-sm font-bold text-slate-400 uppercase mb-4 tracking-wider">控制與參數設定</h2>
                        <div class="grid grid-cols-3 gap-3 mb-6">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">起始值</label>
                                <input type="number" id="start-val" value="0" class="w-full border-slate-200 border rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">終止值 (&lt;)</label>
                                <input type="number" id="end-val" value="5" class="w-full border-slate-200 border rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">步長 (+=)</label>
                                <input type="number" id="step-val" value="1" min="1" class="w-full border-slate-200 border rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                        </div>
                        <button onclick="resetVisualization()" class="w-full bg-slate-800 text-white py-2 rounded-lg hover:bg-slate-700 transition text-sm font-bold mb-4 shadow-md">套用設定並重設</button>
                    </div>
                    
                    <div class="flex gap-2">
                        <button onclick="stepPrev()" id="btn-prev" class="flex-1 bg-slate-100 text-slate-600 px-3 py-3 rounded-lg hover:bg-slate-200 disabled:opacity-40 transition font-bold text-sm">上一步</button>
                        <button onclick="stepNext()" id="btn-next" class="flex-1 bg-blue-600 text-white px-3 py-3 rounded-lg hover:bg-blue-700 transition font-bold text-sm shadow-md">下一步</button>
                        <button onclick="toggleAuto()" id="btn-auto" class="flex-1 bg-orange-500 text-white px-3 py-3 rounded-lg hover:bg-orange-600 transition font-bold text-sm shadow-md">自動播放</button>
                    </div>
                </div>
            </div>

            <!-- [右側] 狀態、終端機與記憶體 -->
            <div class="right-column">
                <!-- 執行過程 Trace Log (直接切換背景色) -->
                <div id="trace-container" class="trace-box bg-ready rounded-xl shadow-md relative overflow-hidden border border-slate-200">
                    <span id="trace-label" class="absolute top-1 left-3 text-[9px] font-mono uppercase opacity-60">Current Status</span>
                    <div id="trace-text" class="text-center w-full px-4 font-bold text-lg">
                        準備就緒...
                    </div>
                </div>

                <!-- Terminal Output (反映 endl 換行) -->
                <div class="terminal-box bg-black p-4 rounded-xl shadow-lg flex flex-col relative overflow-hidden border-2 border-slate-700">
                    <span class="absolute top-1 right-3 text-[10px] text-slate-500 font-mono uppercase">Terminal Output</span>
                    <div id="terminal-output" class="console-text text-green-400 text-xl overflow-y-auto flex-grow pt-2 font-bold tracking-widest leading-relaxed">
                    </div>
                </div>

                <!-- RAM 記憶體狀態 -->
                <div class="dashboard-card-ram bg-white p-5 rounded-xl shadow-lg flex flex-col border-t-4 border-blue-600">
                    <h2 class="text-sm font-bold text-slate-400 uppercase mb-2 tracking-wider">RAM 記憶體狀態</h2>
                    <div class="flex-grow flex items-center justify-around">
                        <div class="text-center">
                            <div class="mb-1">
                                <span id="mem-label" class="text-xs font-bold text-blue-600 font-mono">int i</span>
                            </div>
                            <div id="mem-cell" class="memory-cell w-20 h-20 border-4 border-slate-800 rounded-xl flex items-center justify-center text-3xl font-mono shadow-md bg-slate-50 relative overflow-hidden">
                                <div id="mem-bar" class="absolute top-0 left-0 w-full h-1 bg-slate-800"></div>
                                <span id="mem-value">-</span>
                            </div>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span id="mem-addr" class="text-[9px] font-mono text-slate-400 bg-slate-100 px-2 py-1 rounded w-fit">Addr: 0x7FFD2B</span>
                            <p id="mem-desc" class="text-[10px] text-slate-500 leading-tight italic max-w-[140px]">變數 i 在 Stack 中的即時變化</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <footer class="mt-6 text-center text-slate-400 text-xs">
            <p>提示：觀察背景顏色變化與程式碼執行步驟的對應關係。</p>
        </footer>
    </div>

    <script>
        let state = {
            stepIndex: -1,
            isAuto: false,
            autoInterval: null,
            params: { start: 0, end: 5, step: 1 },
            history: [] 
        };

        const STEP_TYPES = {
            INIT: 'INIT',
            CHECK: 'CHECK',
            BODY: 'BODY',
            UPDATE: 'UPDATE',
            END: 'END'
        };

        const BG_CLASSES = {
            [STEP_TYPES.INIT]: 'bg-init',
            [STEP_TYPES.CHECK]: 'bg-check',
            [STEP_TYPES.BODY]: 'bg-body',
            [STEP_TYPES.UPDATE]: 'bg-update',
            [STEP_TYPES.END]: 'bg-end'
        };

        function updateUI() {
            document.querySelectorAll('.code-line, #code-init, #code-cond, #code-update').forEach(el => {
                el.classList.remove('highlight');
            });

            const memValue = document.getElementById('mem-value');
            const memCell = document.getElementById('mem-cell');
            const memLabel = document.getElementById('mem-label');
            const memBar = document.getElementById('mem-bar');
            const memAddr = document.getElementById('mem-addr');
            const memDesc = document.getElementById('mem-desc');
            const traceContainer = document.getElementById('trace-container');
            const traceText = document.getElementById('trace-text');
            const traceLabel = document.getElementById('trace-label');
            const terminalOutput = document.getElementById('terminal-output');

            const currentStep = state.history[state.stepIndex];
            
            // 初始狀態還原
            memCell.classList.remove('destroyed');
            memLabel.classList.remove('text-red-500');
            memLabel.classList.add('text-blue-600');
            memBar.classList.replace('bg-red-500', 'bg-slate-800');
            memAddr.style.visibility = 'visible';
            memDesc.innerText = "變數 i 在 Stack 中的即時變化";

            if (!currentStep) {
                memValue.innerText = "-";
                traceContainer.className = "trace-box bg-ready rounded-xl shadow-md relative overflow-hidden border border-slate-200";
                traceText.innerText = "準備就緒...";
                traceLabel.style.color = "";
                terminalOutput.innerHTML = "";
                document.getElementById('btn-prev').disabled = true;
                return;
            }

            // 更新記憶體
            if (currentStep.type === STEP_TYPES.END) {
                memValue.innerHTML = "<span class='text-sm text-red-400'>VOID</span>";
                memCell.classList.add('destroyed');
                memLabel.classList.replace('text-blue-600', 'text-red-500');
                memBar.classList.replace('bg-slate-800', 'bg-red-500');
                memAddr.style.visibility = 'hidden';
                memDesc.innerHTML = "<b class='text-red-500 underline'>OutOfScope</b>: 已銷毀";
            } else {
                memValue.innerText = currentStep.i === null ? "?" : currentStep.i;
                if (currentStep.type === STEP_TYPES.UPDATE || currentStep.type === STEP_TYPES.INIT) {
                    memCell.classList.add('changed');
                    setTimeout(() => memCell.classList.remove('changed'), 400);
                }
            }

            // 高亮代碼
            switch (currentStep.type) {
                case STEP_TYPES.INIT: document.getElementById('code-init').classList.add('highlight'); break;
                case STEP_TYPES.CHECK: document.getElementById('code-cond').classList.add('highlight'); break;
                case STEP_TYPES.BODY: document.getElementById('line-2').classList.add('highlight'); break;
                case STEP_TYPES.UPDATE: document.getElementById('code-update').classList.add('highlight'); break;
            }

            // 更新 Trace Container 背景與文字
            traceContainer.className = `trace-box ${BG_CLASSES[currentStep.type]} rounded-xl shadow-md relative overflow-hidden`;
            const lastLog = currentStep.logs[currentStep.logs.length - 1];
            traceText.innerText = lastLog;
            
            // 控制 Label 的對比度
            traceLabel.style.color = (currentStep.type === STEP_TYPES.BODY) ? "#94a3b8" : "white";

            // 更新 Terminal Output
            terminalOutput.innerHTML = currentStep.terminal.join('<br>');
            terminalOutput.scrollTop = terminalOutput.scrollHeight;

            document.getElementById('code-init').innerText = `int i = ${state.params.start}`;
            document.getElementById('code-cond').innerText = `i < ${state.params.end}`;
            document.getElementById('code-update').innerText = state.params.step === 1 ? `i++` : `i += ${state.params.step}`;

            document.getElementById('btn-prev').disabled = state.stepIndex < 0;
            document.getElementById('btn-next').disabled = (currentStep.type === STEP_TYPES.END);
        }

        function generateNextState() {
            let lastState = state.stepIndex === -1 ? 
                { i: null, type: null, logs: [], terminal: [] } : 
                state.history[state.stepIndex];
            
            let next = { 
                i: lastState.i, 
                logs: [...lastState.logs], 
                terminal: [...lastState.terminal],
                type: '' 
            };

            if (state.stepIndex === -1) {
                next.type = STEP_TYPES.INIT;
                next.i = state.params.start;
                next.logs.push(`初始化: i = ${next.i}`);
            } else {
                switch (lastState.type) {
                    case STEP_TYPES.INIT:
                    case STEP_TYPES.UPDATE:
                        // 這是修正點：INIT 或 UPDATE 之後必定接 CHECK
                        next.type = STEP_TYPES.CHECK;
                        const isTrue = next.i < state.params.end;
                        next.logs.push(`檢查: ${next.i} < ${state.params.end} ? ${isTrue ? '成立' : '不成立'}`);
                        // 標記一下，如果檢查不成立，下一步會進入 END
                        next._checkFailed = !isTrue;
                        break;
                    case STEP_TYPES.CHECK:
                        if (lastState._checkFailed) {
                            next.type = STEP_TYPES.END;
                            next.logs.push(`結束: 條件不成立，跳出迴圈並銷毀 i`);
                        } else {
                            next.type = STEP_TYPES.BODY;
                            next.logs.push(`執行: 輸出 ${next.i}`);
                            next.terminal.push(next.i);
                        }
                        break;
                    case STEP_TYPES.BODY:
                        next.type = STEP_TYPES.UPDATE;
                        const prevI = next.i;
                        next.i += state.params.step;
                        next.logs.push(`遞增: ${prevI} → ${next.i}`);
                        break;
                }
            }
            return next;
        }

        function stepNext() {
            if (state.stepIndex < state.history.length - 1) {
                state.stepIndex++;
            } else {
                const next = generateNextState();
                if (next.type) {
                    state.history.push(next);
                    state.stepIndex++;
                }
            }
            updateUI();
            if (state.history[state.stepIndex]?.type === STEP_TYPES.END && state.isAuto) toggleAuto();
        }

        function stepPrev() {
            if (state.stepIndex >= 0) {
                state.stepIndex--;
                updateUI();
            }
        }

        function toggleAuto() {
            state.isAuto = !state.isAuto;
            const btn = document.getElementById('btn-auto');
            if (state.isAuto) {
                btn.innerText = "停止";
                btn.classList.replace('bg-orange-500', 'bg-red-600');
                state.autoInterval = setInterval(stepNext, 800);
            } else {
                btn.innerText = "自動播放";
                btn.classList.replace('bg-red-600', 'bg-orange-500');
                clearInterval(state.autoInterval);
            }
        }

        function resetVisualization() {
            state.params.start = parseInt(document.getElementById('start-val').value) || 0;
            state.params.end = parseInt(document.getElementById('end-val').value) || 5;
            state.params.step = parseInt(document.getElementById('step-val').value) || 1;
            state.stepIndex = -1;
            state.history = [];
            if (state.isAuto) toggleAuto();
            updateUI();
        }

        window.onload = resetVisualization;
    </script>
</body>
</html>
